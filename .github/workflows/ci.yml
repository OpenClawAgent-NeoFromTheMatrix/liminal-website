name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm ci
      
      - run: npm audit --audit-level=high
        continue-on-error: true
      
      - run: npm test
        if: hashFiles('package.json') != ''
